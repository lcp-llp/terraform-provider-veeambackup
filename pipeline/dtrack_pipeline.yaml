parameters:
  - name: repository
    type: string
    default: self
    displayName: 'Repository to scan (use "self" or a resources alias)'
  - name: workingDirectory
    type: string
    default: '.'
    displayName: 'Path to the directory containing the Go module (go.mod)'


trigger:
- none

schedules:
- cron: '0 2 * * 5'
  displayName: 'Weekly Friday 2am UTC'
  branches:
    include:
    - main
  always: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: 'dependency-track'

steps:
- checkout: ${{ parameters.repository }}

- task: GoTool@0
  inputs:
    version: '1.23'
  displayName: 'Install Go'

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: npm install -g @cyclonedx/cdxgen
  displayName: 'Install cdxgen'

- script: |
    echo "=== go version ==="
    go version
    echo "=== go.mod ==="
    cat go.mod
    echo "=== go mod verify ==="
    go mod verify
    echo "=== dependency count ==="
    go list -m all | wc -l
  displayName: 'Diag: Go module info'
  workingDirectory: ${{ parameters.workingDirectory }}

- script: cdxgen -t go --spec-version 1.5 -o '$(Agent.TempDirectory)/bom.json' .
  displayName: 'Create Go provider SBOM'
  workingDirectory: ${{ parameters.workingDirectory }}

- script: |
    echo "=== BOM file size ==="
    wc -c '$(Agent.TempDirectory)/bom.json'
    echo "=== Component count ==="
    node -e "const b = require('$(Agent.TempDirectory)/bom.json'); console.log('components:', (b.components || []).length, '| dependencies:', (b.dependencies || []).length);"
    echo "=== BOM metadata ==="
    node -e "const b = require('$(Agent.TempDirectory)/bom.json'); console.log(JSON.stringify(b.metadata, null, 2));"
    echo "=== Component names ==="
    node -e "const b = require('$(Agent.TempDirectory)/bom.json'); (b.components || []).forEach(c => console.log(c.name + '@' + c.version));"
  displayName: 'Diag: Validate SBOM contents'

- task: upload-bom-dtrack@1
  displayName: 'Upload SBOM to Dependency-Track'
  inputs:
      bomFilePath: '$(Agent.TempDirectory)/bom.json'
      dtrackProjName: 'terraform-provider-veeambackup'
      dtrackProjVersion: '1.0.0'
      dtrackAPIKey: '$(INFRA_DTRACK_API_KEY)'
      dtrackURI: '$(DTRACK_URI)'
      dtrackProjAutoCreate: true
      thresholdAction: 'warn'
      thresholdCritical: 0
      thresholdHigh: 5
